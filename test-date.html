<!DOCTYPE html>
<html>
<head>
    <title>VoxValt Date Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px 0; }
        button:hover { background: #5568d3; }
        .result { background: #f5f5f5; padding: 15px; border-radius: 4px; margin: 10px 0; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <h1>🎙️ VoxValt Date Extraction Test</h1>
    
    <div class="test-section">
        <h2>Test Date Extraction</h2>
        <p>Enter a phrase with a date/time to test extraction:</p>
        <input type="text" id="testInput" placeholder="e.g., Call Mom tomorrow at 5pm" />
        <button onclick="testDateExtraction()">Test Extraction</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        async function testDateExtraction() {
            const input = document.getElementById('testInput').value;
            const resultDiv = document.getElementById('result');
            
            if (!input.trim()) {
                resultDiv.innerHTML = '<p class="error">Please enter some text to test</p>';
                return;
            }

            resultDiv.innerHTML = '<p>Testing...</p>';

            try {
                const response = await fetch('/api/process-voice', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        transcript: input,
                        duration: 0
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    let html = '<p class="success">✅ Extraction successful!</p>';
                    html += '<h3>Results:</h3>';
                    
                    if (data.extracted && data.extracted.items) {
                        data.extracted.items.forEach((item, index) => {
                            html += `<div style="margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 4px;">`;
                            html += `<strong>Item ${index + 1}:</strong> ${item.content}<br>`;
                            html += `<strong>Type:</strong> ${item.type}<br>`;
                            html += `<strong>Due Date:</strong> ${item.due_date || 'No date extracted'}`;
                            html += `</div>`;
                        });
                    } else {
                        html += '<p class="error">No items found in extraction</p>';
                    }
                    
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Error: ${data.error || 'Unknown error'}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Network Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
